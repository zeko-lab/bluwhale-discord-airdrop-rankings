<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bluwhale Airdrop Leaderboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <h1>Bluwhale Airdrop Leaderboard</h1>
    <p class="subtitle">MEE6 · Engage · Submissions — combined ranking</p>
  </header>

  <main class="main main--with-sidebar">
    <div class="main-content">
      <div id="loading" class="loading">Loading leaderboard…</div>
      <div id="error" class="error" hidden></div>
      <div id="table-wrap" class="table-wrap" hidden>
        <table class="leaderboard">
          <thead>
            <tr>
              <th>#</th>
              <th>User</th>
              <th>MEE6</th>
              <th>Engage</th>
              <th>BluSub</th>
              <th>Roles</th>
              <th>Score</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
    <aside id="info-box" class="info-box" aria-label="How scoring works"></aside>
  </main>

  <script src="app.js"></script>
  <script>
    (function() {
      const tbody = document.getElementById("tbody");
      const loading = document.getElementById("loading");
      const error = document.getElementById("error");
      const tableWrap = document.getElementById("table-wrap");

      async function load() {
        try {
          const [dataRes, configRes] = await Promise.all([
            fetch("/api/fetch-leaderboard"),
            fetch("/airdrop-config.json"),
          ]);
          if (!dataRes.ok) throw new Error("Failed to load leaderboard");
          if (!configRes.ok) throw new Error("Failed to load config");
          const data = await dataRes.json();
          const config = await configRes.json();
          if (data.error) throw new Error(data.error);

          const weightEngage = config.weight_engage ?? 100;
          const weightBlusub = config.weight_blusub ?? 50;
          const scoreDivisor = Math.max(1, Number(config.score_divisor) || 100);
          const mee6Bonuses = config.mee6RoleBonuses || {};
          const specialRoles = config.specialRoles || {};

          function norm(u) { return (u || "").trim().toLowerCase(); }

          function formatScore(raw) {
            const scaled = raw / scoreDivisor;
            if (scaled % 1 === 0) return String(scaled);
            const s = scaled.toFixed(2);
            return s.replace(/\.?0+$/, "");
          }

          const rows = (data.users || []).map((u) => {
            let bonusPct = 0;
            for (const r of (u.mee6RoleNames || [])) {
              if (mee6Bonuses[r] != null) bonusPct += Number(mee6Bonuses[r]);
            }
            for (const [roleName, roleConfig] of Object.entries(specialRoles)) {
              const members = (roleConfig.members || []).map((m) => norm(m));
              if (members.includes(norm(u.username))) bonusPct += Number(roleConfig.bonusPercent || 0);
            }
            const base =
              (u.mee6Xp || 0) +
              (u.engagePoints || 0) * weightEngage +
              (u.blusubPoints || 0) * weightBlusub;
            const final = Math.round(base * (1 + bonusPct / 100) * 100) / 100;
            return { ...u, final, bonusPct, base };
          });

          rows.sort((a, b) => b.final - a.final);

          tbody.innerHTML = "";
          rows.forEach((u, i) => {
            const tr = document.createElement("tr");
            const roles = [...(u.mee6RoleNames || [])];
            for (const [name, roleConfig] of Object.entries(specialRoles)) {
              const members = (roleConfig.members || []).map((m) => norm(m));
              if (members.includes(norm(u.username))) roles.push(name);
            }
            const baseStr = (u.base ?? 0).toLocaleString();
            const finalStr = (u.final ?? 0).toLocaleString();
            const bonusLines = [];
            (u.mee6RoleNames || []).forEach((r) => {
              const pct = mee6Bonuses[r];
              if (pct != null && pct !== "" && Number(pct) !== 0) {
                bonusLines.push("• " + r + " (MEE6 level role): +" + pct + "%");
              }
            });
            Object.entries(specialRoles).forEach(([name, cfg]) => {
              const members = (cfg.members || []).map((m) => norm(m));
              if (members.includes(norm(u.username)) && (Number(cfg.bonusPercent) || 0) !== 0) {
                bonusLines.push("• " + name + " (special role): +" + (cfg.bonusPercent || 0) + "%");
              }
            });
            let scoreTip = "Base: " + baseStr + "\n= MEE6 XP + (Engage×" + weightEngage + ") + (BluSub×" + weightBlusub + ")";
            if (bonusLines.length) {
              scoreTip += "\n\nWhere your bonus % comes from:\n" + bonusLines.join("\n") + "\nTotal role bonus: +" + (u.bonusPct ?? 0) + "%";
            } else {
              scoreTip += "\n\nRole bonus: +0% (no qualifying roles)";
            }
            scoreTip += "\n\nFinal: " + baseStr + " × (1 + " + (u.bonusPct ?? 0) + "%) = " + finalStr + "\nDisplay: " + finalStr + " ÷ " + scoreDivisor + " = " + formatScore(u.final);
            tr.innerHTML =
              "<td>" + (i + 1) + "</td>" +
              "<td><span class='username'>" + escapeHtml(u.username || "—") + "</span></td>" +
              "<td>" + (u.mee6Xp ?? 0) + " <small>Lv." + (u.mee6Level ?? 0) + "</small></td>" +
              "<td>" + (u.engagePoints ?? 0) + "</td>" +
              "<td>" + (u.blusubPoints ?? 0) + "</td>" +
              "<td><span class='roles'>" + escapeHtml(roles.join(", ") || "—") + "</span></td>" +
              "<td class='score-cell' title='" + escapeHtml(scoreTip.replace(/'/g, "&#39;")) + "'><strong>" + escapeHtml(formatScore(u.final)) + "</strong></td>";
            tbody.appendChild(tr);
          });

          const infoBox = document.getElementById("info-box");
          let infoHtml = "<h3>How score works</h3>";
          infoHtml += "<p><strong>Base</strong> = MEE6 XP + (Engage × " + weightEngage + ") + (BluSub × " + weightBlusub + ")</p>";
          infoHtml += "<p><strong>Score</strong> = Base × (1 + role bonus %) then ÷ " + scoreDivisor + " for display.</p>";
          const mee6List = Object.entries(mee6Bonuses).filter(([, v]) => v != null && v !== "" && Number(v) !== 0);
          const specialList = Object.entries(specialRoles).filter(([, c]) => c && (Number(c.bonusPercent) || 0) !== 0);
          if (mee6List.length || specialList.length) {
            infoHtml += "<p><strong>Role bonuses</strong> (each adds this % to your score):</p><ul>";
            mee6List.forEach(([name, pct]) => { infoHtml += "<li><code>" + escapeHtml(name) + "</code>: +" + pct + "%</li>"; });
            specialList.forEach(([name, c]) => { infoHtml += "<li>Special <code>" + escapeHtml(name) + "</code>: +" + (c.bonusPercent || 0) + "%</li>"; });
            infoHtml += "</ul>";
          }
          infoBox.innerHTML = infoHtml;

          loading.hidden = true;
          error.hidden = true;
          tableWrap.hidden = false;
        } catch (e) {
          loading.hidden = true;
          tableWrap.hidden = true;
          error.textContent = e.message || "Something went wrong.";
          error.hidden = false;
        }
      }

      function escapeHtml(s) {
        const div = document.createElement("div");
        div.textContent = s;
        return div.innerHTML;
      }

      load();
    })();
  </script>
</body>
</html>
